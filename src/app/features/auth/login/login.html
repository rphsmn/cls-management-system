<div class="login-screen">
  <div class="login-card">
    <div class="logo">
      <h2>CLS Management</h2>
      <p>Sign in to your account</p>
    </div>

    <form #loginForm="ngForm" (ngSubmit)="onLogin()">
      <div class="form-group">
        <label>Employee ID</label>
        <input 
          type="text" 
          [(ngModel)]="employeeId" 
          name="employeeId" 
          placeholder="e.g. EMP-001" 
          required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input 
          type="password" 
          [(ngModel)]="password" 
          name="password" 
          placeholder="••••••••" 
          required>
      </div>

      <p class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" [disabled]="!loginForm.form.valid">Login</button>
    </form>
  </div>
</div>
